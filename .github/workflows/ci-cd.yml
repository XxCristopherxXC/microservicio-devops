name: AWS DevOps Pipeline - Spring Boot

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Clonar tu repositorio real de GitHub
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      # 2. Configurar el entorno de Java 17 declarada en pom.xml
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 3. COMPILACIÓN Y PRUEBAS UNITARIAS (Cumple IE6)
      - name: Compilar y Ejecutar Pruebas Unitarias
        run: mvn clean test

      # 4. ANÁLISIS DE CUMPLIMIENTO NORMATIVO Y CALIDAD (Cumple IE5 y IE6)
      - name: Análisis de Calidad y Seguridad con SonarCloud
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn verify sonar:sonar \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.projectKey=xxcristopherxxc_microservicio-devops \
            -Dsonar.organization=xxcristopherxxc

      # 5. AUTENTICACIÓN EN LA NUBE DE AWS PERSONAL (Corregido para Cuenta Personal)
      - name: Configurar credenciales de AWS
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1  # Verifica si tu cuenta personal usa us-east-1, de lo contrario cambia la región

      # 6. CONSTRUCCIÓN Y EMPAQUETADO EN CONTENEDOR (Cumple IE2)
      - name: Iniciar sesión en Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Construye la imagen usando tu Dockerfile local y realiza el PUSH a ECR
      - name: Construir y Subir Imagen a Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: microservicio-devops
          IMAGE_TAG: latest
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      # 7. DESPLIEGUE AUTOMÁTICO EN AMAZON ECS (Gatilla el PULL automático en Fargate)
      # Este paso descarga la definición actual de la tarea desde tu AWS
      - name: Descargar Definición de Tarea de ECS
        run: |
          aws ecs describe-task-definition --task-definition tarea-devops --query taskDefinition > task-definition.json

      # Este paso actualiza la definición con la nueva imagen Docker generada en ECR
      - name: Actualizar el URI de la Imagen en la Definición de Tarea
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: microservicio-container
          image: ${{ steps.build-image.outputs.image }}

      # Este paso despliega la tarea en el clúster (fuerza a ECS a hacer el Pull automático)
      - name: Desplegar en Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          service: microservicio-service
          cluster: devops-cluster
          wait-for-service-stability: true
