name: AWS DevOps Pipeline - Spring Boot

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Clonar tu repositorio real de GitHub
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      # 2. Configurar el entorno de Java 17 que declaraste en tu pom.xml
      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 3. COMPILACIÓN Y PRUEBAS UNITARIAS (Cumple IE6)
      # Ejecuta las pruebas usando la base de datos H2 simulada para evitar caídas
      - name: Compilar y Ejecutar Pruebas Unitarias
        run: mvn clean test

      # 4. ANÁLISIS DE CUMPLIMIENTO NORMATIVO Y CALIDAD (Cumple IE5 y IE6)
      # ¡ACTIVADO RECONECTADO! Envía los datos reales usando tu SONAR_TOKEN
      - name: Análisis de Calidad y Seguridad con SonarCloud
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn verify sonar:sonar -Dsonar.projectKey=XxCristopherxXC_microservicio-devops -Dsonar.organization=XxCristopherxXC

      # 5. AUTENTICACIÓN EN LA NUBE DE AWS (Cumple IE2)
      # Incluye las tres llaves necesarias para entornos educativos/Learner Labs de Duoc UC
      - name: Configurar credenciales de AWS
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      # 6. CONSTRUCCIÓN Y EMPAQUETADO EN CONTENEDOR (Cumple IE2)
      # Inicia sesión de manera automatizada en el registro de AWS (Amazon ECR)
      - name: Iniciar sesión en Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Construye la imagen usando tu Dockerfile local y la sube a la nube
      - name: Construir y Subir Imagen a Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: microservicio-devops
          IMAGE_TAG: latest
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG