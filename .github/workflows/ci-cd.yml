name: AWS DevOps Pipeline - Spring Boot

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Clonar tu repositorio real de GitHub
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      # 2. Configurar el entorno de Java 17 que declaraste en tu pom.xml
      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 3. COMPILACIÓN Y PRUEBAS UNITARIAS (Cumple IE6)
      - name: Compilar y Ejecutar Pruebas Unitarias
        run: mvn clean test

      # 4. ANÁLISIS DE CUMPLIMIENTO NORMATIVO Y CALIDAD (Cumple IE5 y IE6)
      - name: Análisis de Calidad y Seguridad con SonarCloud
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn verify sonar:sonar \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.projectKey=xxcristopherxxc_microservicio-devops \
            -Dsonar.organization=xxcristopherxxc

      # 5. AUTENTICACIÓN EN LA NUBE DE AWS ACADEMY (Con soporte total de Session Token)
      - name: Configurar credenciales de AWS
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      # 6. INICIAR SESIÓN Y SUBIR IMAGEN DIRECTO A ECR (Método directo anti-bloqueos)
      - name: Construir, Autenticar y Subir Imagen a Amazon ECR
        run: |
          # Login directo nativo de AWS CLI usando tu ID de cuenta de AWS Academy
          aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 118315411635.dkr.ecr.us-east-1.amazonaws.com
          
          # Construcción del contenedor Docker localmente en el runner
          docker build -t 118315411635.dkr.ecr.us-east-1.amazonaws.com/microservicio-devops:latest .
          
          # Subida de la imagen final al repositorio de Amazon ECR
          docker push 118315411635.dkr.ecr.us-east-1.amazonaws.com/microservicio-devops:latest
