name: AWS DevOps Pipeline - Spring Boot

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Clonar tu repositorio real de GitHub
      - name: Clonar el repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Necesario para que SonarQube realice el análisis completo de historial

      # 2. Configurar el entorno de Java 17 que declaraste en tu pom.xml
      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 3. COMPILACIÓN Y PRUEBAS UNITARIAS (Cumple IE6)
      - name: Compilar y Ejecutar Pruebas Unitarias
        run: mvn clean test

      # 4. ANÁLISIS DE CUMPLIMIENTO NORMATIVO Y CALIDAD (Cumple IE5)
      - name: Análisis de Calidad y Seguridad con SonarCloud
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn verify sonar:sonar \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.projectKey=xxcristopherxxc_microservicio-devops \
            -Dsonar.organization=xxcristopherxxc

      # 5. CONTROL DE CALIDAD ESTRICTO (Cumple IE6 - Mecanismo de Falla Crítica)
      # Bloquea el pipeline por completo si el Quality Gate de SonarQube no está en VERDE
      - name: Validar Quality Gate (Interrupción Automatizada)
        uses: sonarsource/sonarcloud-quality-gate-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          scanMetadataReportFile: target/sonar/report-task.txt

      # 6. AUTENTICACIÓN EN LA NUBE DE AWS
      - name: Configurar credenciales de AWS
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      # 7. CONSTRUCCIÓN Y EMPAQUETADO EN CONTENEDOR (Cumple IE2)
      - name: Iniciar sesión en Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Construye la imagen usando tu Dockerfile local y la sube a la nube
      - name: Construir y Subir Imagen a Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: microservicio-devops
          IMAGE_TAG: latest
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      # 8. DESPLIEGUE EN ENTORNO ORQUESTADO (Cumple IE2)
      # Fuerza a Amazon ECS a descargar la nueva imagen levantando tareas actualizadas de forma automatizada
      - name: Desplegar Actualización en Amazon ECS
        run: |
          aws ecs update-service --cluster mi-cluster-ecs --service mi-servicio-devops --force-new-deployment --region us-east-1
